<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Journies - Adventure Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen transition-colors duration-500 bg-[var(--bg-primary)] text-[var(--text-main)]">

    <nav class="sticky top-0 z-40 w-full px-6 py-4 flex items-center justify-between glass-nav border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-map-marked-alt animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">Travel<span class="text-blue-500">Journies</span></h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div class="w-16 h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div id="storage-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <span id="storage-text" class="text-[10px] font-bold opacity-50 uppercase tracking-tighter">0/20</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <button id="theme-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                <i class="fas fa-sun" id="theme-icon"></i>
            </button>
            <button id="add-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-full font-bold text-sm shadow-lg flex items-center gap-2 transition-all active:scale-95">
                <i class="fas fa-plus"></i> <span class="hidden sm:inline">New Journey</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-10 pb-24">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-black mb-2 tracking-tight">My Gallery</h2>
                <p class="text-slate-500 font-medium">Relive your favorite travel journies.</p>
            </div>
            <div class="flex gap-2">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search" placeholder="Search destinations..." class="pl-12 pr-4 py-3 w-64 md:w-80 rounded-2xl bg-white dark:bg-slate-800 border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button id="filter-fav" class="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 flex items-center justify-center shadow-sm hover:text-red-500 transition-colors">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div id="empty" class="hidden flex flex-col items-center justify-center py-32 text-center opacity-50">
            <i class="fas fa-route text-5xl mb-4"></i>
            <h3 class="text-xl font-bold">No journies found</h3>
            <p>Start your first adventure today!</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-card">
            <div class="flex h-[650px] flex-col md:flex-row">
                <div class="hidden md:flex w-52 bg-gradient-to-b from-blue-600 to-indigo-700 p-8 flex-col justify-between text-white">
                    <h2 id="modal-title" class="text-2xl font-bold leading-tight">Add Journey</h2>
                    <p class="text-[10px] font-bold tracking-widest opacity-40 uppercase">Travel Journies v2</p>
                </div>
                <div class="flex-1 p-8 overflow-y-auto custom-scroll">
                    <div class="space-y-6">
                        <input type="text" id="in-title" placeholder="Journey Title" class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
                        <input type="text" id="in-location" placeholder="Where did you go?" class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
                        
                        <div class="space-y-2">
                            <label class="w-full h-24 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-500/5 transition-all">
                                <input type="file" id="in-files" multiple accept="image/*" class="hidden">
                                <i class="fas fa-camera text-blue-500 mb-1"></i>
                                <span id="upload-label" class="text-xs font-bold text-slate-500">Pick some photos</span>
                            </label>
                        </div>

                        <textarea id="in-content" rows="4" placeholder="Tell the story..." class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none resize-none"></textarea>

                        <div class="flex gap-4">
                            <button class="close-modal flex-1 py-4 font-bold text-slate-400 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800">Cancel</button>
                            <button id="save-btn" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-blue-700">Save Journey</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all duration-300 pointer-events-none z-[100]">
        <span id="toast-msg"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
